services:
  - type: web
    name: shieldai-api
    runtime: python
    runtimeVersion: "3.12"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: shieldai-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: DEBUG
        value: "false"

databases:
  - name: shieldai-db
    plan: free
    region: oregon
