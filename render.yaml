services:
  - type: web
    name: shieldai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shieldai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: DEBUG
        value: "false"

databases:
  - name: shieldai-db
    plan: free
